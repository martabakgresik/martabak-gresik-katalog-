name: Scheduled AI Blog Generation

on:
  schedule:
    # Run at 01:45 UTC (08:45 WIB) - buffer 15 menit sebelum jam 9 WIB
    # Mengantisipasi antrian GitHub Actions yang bisa delay 10-30 menit
    - cron: '45 1 */2 * *'
  workflow_dispatch:

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run AI Generator
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        run: node scripts/ai-blog-generator.js

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/content/blog/ public/images/blog/
          git commit -m "chore: auto-generate AI blog post [skip ci]" || echo "No changes to commit"
          git push
