name: Scheduled AI Blog Generation

on:
  schedule:
    # Run every Monday at 01:00 UTC (08:00 WIB)
    - cron: '0 1 * * 1'
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  generate-blog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm install

      - name: Run AI Generator
        env:
          POLLINATIONS_API_KEY: ${{ secrets.POLLINATIONS_API_KEY }}
        run: npx tsx scripts/ai-blog-generator.ts

      - name: Commit and Push Changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add src/content/blog/ public/images/blog/
          git commit -m "chore: auto-generate AI blog post [skip ci]" || echo "No changes to commit"
          git push
