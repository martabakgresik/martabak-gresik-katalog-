<!DOCTYPE html>
<html>
<head>
    <title>WebP Converter</title>
</head>
<body>
    <canvas id="canvas" style="display:none;"></canvas>
    <div id="output" style="word-break: break-all; font-family: monospace;"></div>
    <script>
        async function convert() {
            const urlParams = new URLSearchParams(window.location.search);
            const src = urlParams.get('src');
            const quality = parseFloat(urlParams.get('quality') || '0.8');
            if (!src) return;

            const img = new Image();
            img.crossOrigin = "anonymous";
            img.onload = function() {
                const canvas = document.getElementById('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0);
                const webpData = canvas.toDataURL('image/webp', quality);
                document.getElementById('output').textContent = webpData;
                window.status = "done"; // Signal for subagent
            };
            img.onerror = function() {
                document.getElementById('output').textContent = "error";
                window.status = "done";
            };
            img.src = src;
        }
        convert();
    </script>
</body>
</html>
